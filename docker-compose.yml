services:
  kanban:
    container_name: kanban-app
    build:
      context: .
      args:
        - VITE_AUTH_MODE=local
    ports:
      - "8102:80"
    depends_on:
      - auth
    networks:
      - kanban-net
    restart: always

  auth:
    container_name: kanban-auth
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - AUTH_MODE=local
      - PORT=4000
      - NODE_ENV=production
      # Set SESSION_SECRET in a .env file at the repo root (never commit it).
      # Generate one with: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET}
      - APP_BASE_URL=${APP_BASE_URL}

      # LDAP — point at your AD/LDAP server. Use ldaps:// in production.
      #- LDAP_URL=${LDAP_URL:?LDAP_URL must be set}
      #- LDAP_BIND_DN_TEMPLATE=${LDAP_BIND_DN_TEMPLATE:?LDAP_BIND_DN_TEMPLATE must be set}
      #- LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:?LDAP_SEARCH_BASE must be set}
      #- LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER}
      #- LDAP_ROLE_MAP=${LDAP_ROLE_MAP:-{}}
      #- LDAP_DEFAULT_ROLE=${LDAP_DEFAULT_ROLE:-Viewer}
      #- LDAP_ALLOW_PLAINTEXT=${LDAP_ALLOW_PLAINTEXT:-false}
      # TLS — for self-signed / internal CA certs:
      #- LDAP_TLS_CA_CERT_PATH=/app/certs/ldap-ca.pem
      # Set to 'false' only as a last resort (skips cert verification entirely):
      #- LDAP_TLS_REJECT_UNAUTHORIZED=false

      # OIDC (Entra ID) — switch AUTH_MODE=oidc and fill these:
      #- OIDC_TENANT_ID=${OIDC_TENANT_ID}
      #- OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      #- OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      #- OIDC_REDIRECT_URI=${APP_BASE_URL}/auth/callback

      # Local mode — switch AUTH_MODE=local and fill these:
      - LOCAL_USERS_PATH=/app/data/users.json
      - BOOTSTRAP_ADMIN_USER=admin
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      - ./server/data:/app/data
    networks:
      - kanban-net
    restart: always

networks:
  kanban-net:
    driver: bridge

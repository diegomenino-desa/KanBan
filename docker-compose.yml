services:
  kanban:
    container_name: kanban-app
    build: .
    ports:
      - "8102:5173"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth:4000
      # Choose login UI: ldap | local (username+password form) or oidc (Microsoft button)
      - VITE_AUTH_MODE=ldap
    depends_on:
      - auth
    networks:
      - kanban-net
    restart: always

  auth:
    container_name: kanban-auth
    build: ./server
    ports:
      - "4000:4000"
    environment:
      # Copy values from server/.env.example and override here for your environment.
      - AUTH_MODE=ldap
      - PORT=4000
      - NODE_ENV=development
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-me-change-me-change-me}
      - APP_BASE_URL=http://localhost:8102
      # LDAP (on-prem AD)
      #- LDAP_URL=${LDAP_URL:-ldaps://dc.corp.example:636}
      #- LDAP_BIND_DN_TEMPLATE=${LDAP_BIND_DN_TEMPLATE:-{{username}}@corp.example}
      #- LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-dc=corp,dc=example}
      
      #- LDAP_URL=${LDAP_URL:-ldap://ldap.forumsys.com:389}
      #- LDAP_BIND_DN_TEMPLATE=${LDAP_BIND_DN_TEMPLATE:-uid={{username}},dc=example,dc=com}
      #- LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-dc=example,dc=com}
      #- LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-(uid={{username}})}
      #- LDAP_DEFAULT_ROLE=${LDAP_DEFAULT_ROLE:-Admin}

      - LDAP_URL=ldap://ldap.forumsys.com:389
      - LDAP_BIND_DN_TEMPLATE=uid={{username}},dc=example,dc=com
      - LDAP_SEARCH_BASE=dc=example,dc=com
      - LDAP_SEARCH_FILTER=(uid={{username}})
      - LDAP_DEFAULT_ROLE=Admin



      # OIDC (Entra ID) — uncomment AUTH_MODE=oidc above and fill these:
      # - OIDC_TENANT_ID=${OIDC_TENANT_ID}
      # - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      # - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      # - OIDC_REDIRECT_URI=http://localhost:8102/auth/callback

      # Local mode — set AUTH_MODE=local above, then uncomment these.
      # Bootstrap vars seed a single Admin on first start when the store is
      # empty, then can be removed. Manage users later with:
      #   docker compose exec auth npm run user:add <user> <name> <email> <role>
      - LOCAL_USERS_PATH=/app/data/users.json
      # - BOOTSTRAP_ADMIN_USER=admin
      # - BOOTSTRAP_ADMIN_PASSWORD=change-me-at-least-8-chars
    volumes:
      - ./server/data:/app/data
    networks:
      - kanban-net
    restart: always

networks:
  kanban-net:
    driver: bridge

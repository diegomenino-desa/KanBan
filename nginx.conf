server {
    listen 80;
    server_name _;

    # Proxy auth and API calls to the auth service
    location /auth/ {
        proxy_pass         http://auth:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Preserve Set-Cookie headers from the auth service
        proxy_pass_header  Set-Cookie;
    }

    location /api/ {
        proxy_pass         http://auth:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_header  Set-Cookie;
    }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
